name: My First CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Display Runner Information
        run: |
          hostname
          whoami

      - name: Print Message
        run: echo "Hello! My Self-hosted Runner is working."