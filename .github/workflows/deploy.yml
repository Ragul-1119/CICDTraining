name: Angular CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Packages
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: dist/CICDTraining

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: deploy

      - name: Deploy to IIS
        shell: powershell
        run: |
          $source = "deploy"
          $destination = "D:\Workspace\Ragul\WebApps\CICDTraining"

          Remove-Item "$destination\*" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "$source\*" -Destination $destination -Recurse -Force

          Write-Host "Deployment completed successfully."
